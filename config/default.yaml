# ── Data ──────────────────────────────────────────────────────────────────────
data:
  ticker: "005930.KS"          # Samsung Electronics on KRX via Yahoo Finance
  start_date: "2015-01-01"
  end_date: null               # null → today
  interval: "1d"
  cache_dir: "data/raw"

# ── Target ────────────────────────────────────────────────────────────────────
target:
  kind: "next_day_log_return"  # options: next_day_log_return | next_day_direction | next_5d_log_return
  horizon: 1                   # trading days ahead

# ── Features ──────────────────────────────────────────────────────────────────
features:
  return_windows: [1, 5, 10, 20]
  ma_windows: [5, 20, 60]
  rsi_window: 14
  atr_window: 14
  volume_ma_window: 20

# ── Walk-forward ──────────────────────────────────────────────────────────────
backtest:
  initial_train_days: 504      # ~2 years
  step_days: 63                # ~3 months per fold
  min_train_days: 252          # never train on less than 1 year

# ── LightGBM baseline ─────────────────────────────────────────────────────────
lgbm:
  n_estimators: 300
  learning_rate: 0.05
  max_depth: 5
  num_leaves: 31
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_state: 42

# ── External data (optional macro/market feature enrichment) ──────────────────
# Set enabled: true and supply the required API keys (see README for env vars).
# Each entry in series[] adds one "ext_{name}" column to the feature matrix.
#
# Leakage prevention: every series is shifted by lag_days Samsung trading days
# before merging.  lag_days >= 1 is enforced by the pipeline.
# Use lag_days >= 5 for monthly data to account for announcement delays.
#
# API keys required (set as environment variables — never put keys here):
#   FRED_API_KEY   free at https://fred.stlouisfed.org/docs/api/api_key.html
#   ECOS_API_KEY   free at https://ecos.bok.or.kr/#/
#   DART_API_KEY   free at https://opendart.fss.or.kr/intro/main.do
#   NEWSAPI_KEY    free at https://newsapi.org/register  (recent 30d only)
#   (yfinance / "market" source requires no API key)
#
# Source tiers:
#   Tier 1 — official facts    : dart (Korean FSS disclosures)
#   Tier 2 — market prices     : market (yfinance), fred
#   Tier 3 — perception signal : gdelt news sentiment (not ground truth)
external_data:
  enabled: false                  # flip to true to activate external features
  cache_dir: "data/external"
  cache_ttl_hours: 24.0

  series:
    # ── Tier 2: Macro / market prices (no API key) ───────────────────────────
    - name: "kospi"               # KOSPI Composite Index log return
      source: "market"
      symbol: "^KS11"
      lag_days: 1
      feature_type: "log_return"
      frequency: "daily"

    - name: "usdkrw"              # USD/KRW exchange rate log return
      source: "market"
      symbol: "USDKRW=X"
      lag_days: 1
      feature_type: "log_return"
      frequency: "daily"

    - name: "sox"                 # Philadelphia Semiconductor Index log return
      source: "market"
      symbol: "^SOX"
      lag_days: 1
      feature_type: "log_return"
      frequency: "daily"

    - name: "hynix"               # SK Hynix log return (sector peer)
      source: "market"
      symbol: "000660.KS"
      lag_days: 1
      feature_type: "log_return"
      frequency: "daily"

    - name: "dxy"                 # US Dollar Index log return
      source: "market"
      symbol: "DX-Y.NYB"
      lag_days: 1
      feature_type: "log_return"
      frequency: "daily"

    - name: "sp500"               # S&P 500 log return (global risk proxy)
      source: "market"
      symbol: "^GSPC"
      lag_days: 1
      feature_type: "log_return"
      frequency: "daily"

    - name: "us10y"               # US 10-Year Treasury yield level (%)
      source: "fred"
      symbol: "GS10"
      lag_days: 1
      feature_type: "level"
      frequency: "daily"
      api_key_env: "FRED_API_KEY"

    - name: "vix"                 # CBOE VIX volatility index level
      source: "fred"
      symbol: "VIXCLS"
      lag_days: 1
      feature_type: "level"
      frequency: "daily"
      api_key_env: "FRED_API_KEY"

    - name: "kr_base_rate"        # Bank of Korea base interest rate (%)
      source: "ecos"
      symbol: "722Y001"
      lag_days: 5                 # 5-day lag accounts for announcement delays
      feature_type: "level"
      frequency: "monthly"
      api_key_env: "ECOS_API_KEY"
      extra:
        item_code: "0101000"
        cycle: "MM"

    # ── Tier 1: Official DART disclosures (requires DART_API_KEY) ────────────
    - name: "dart_earnings"       # Quarterly/annual earnings filings count
      source: "dart"
      symbol: "00126380"          # Samsung Electronics corp_code
      lag_days: 1
      feature_type: "level"
      frequency: "daily"
      api_key_env: "DART_API_KEY"
      extra:
        pblntf_ty: "A"            # 정기공시: audited facts only

    - name: "dart_major"          # Material event disclosures count
      source: "dart"
      symbol: "00126380"
      lag_days: 1
      feature_type: "level"
      frequency: "daily"
      api_key_env: "DART_API_KEY"
      extra:
        pblntf_ty: "B"            # 주요사항보고서: capex, M&A, management

    # ── Tier 3: News perception signal (GDELT — no key, historical from 2013) ─
    # IMPORTANT: Treat as "market perception", not factual ground truth.
    # Stored separately from fundamental (DART) features.
    - name: "news_tone"           # Daily avg sentiment tone from GDELT
      source: "gdelt"
      symbol: "samsung electronics semiconductor"
      lag_days: 1
      feature_type: "level"
      frequency: "daily"
      extra:
        metric: "tone"

    - name: "news_count"          # Daily article volume from GDELT
      source: "gdelt"
      symbol: "samsung electronics"
      lag_days: 1
      feature_type: "level"
      frequency: "daily"
      extra:
        metric: "count"

# ── LLM (optional) ────────────────────────────────────────────────────────────
# Set provider to "none" to run fully deterministic (no LLM calls).
# Set to "openai" or "anthropic" and supply the matching API key env var.
llm:
  provider: "openai"                    # none | openai | anthropic
  model: "gpt-4o-mini"               # openai: gpt-4o-mini | anthropic: claude-haiku-4-5-20251001
  temperature: 0.2
  max_tokens: 1024
  timeout_seconds: 30.0
  api_key_env: "OPENAI_API_KEY"     # env var that holds the API key

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  format: "%(asctime)s  %(levelname)-8s  %(name)s  %(message)s"
